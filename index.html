<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniLoop - Global Campus Network</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* Alt Navigasyon (Bottom Nav) İkonlarını ve Metinlerini Aşağı Çekme / Ortalama Düzeltmesi */
        .bottom-nav {
            align-items: flex-end !important; 
            padding-bottom: calc(env(safe-area-inset-bottom) + 8px) !important;
            padding-top: 5px !important;
        }
        .bottom-nav-item {
            justify-content: flex-end !important; 
            gap: 2px !important; 
        }
        .bottom-nav-icon {
            margin-bottom: 2px !important; 
            margin-top: 4px !important; 
        }
        
        /* Üst Bar Premium Butonu Animasyonu */
        .premium-glow {
            animation: glowPulse 2s infinite alternate;
        }
        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px rgba(245, 158, 11, 0.4); }
            100% { box-shadow: 0 0 15px rgba(245, 158, 11, 0.8); }
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="login-card">
        <div class="auth-logo">🌍 UniLoop</div>
        <p class="auth-subtitle">Kampüs ağına giriş yap, döngüde kal.</p>
        
        <div class="form-group">
            <input type="email" id="login-email" placeholder="E-posta Adresiniz">
        </div>
        <div class="form-group" style="margin-bottom: 8px;">
            <input type="password" id="login-password" placeholder="Şifren">
        </div>
        
        <div style="text-align: right; margin-bottom: 20px;">
            <span id="forgot-password-btn" style="font-size: 13px; color: var(--primary); cursor: pointer; font-weight: 600;">Şifremi Unuttum</span>
        </div>
        
        <button class="btn-primary" id="login-btn" style="margin-bottom: 10px; padding: 12px; font-size: 16px;">Giriş Yap</button>
        <button class="action-btn" id="show-register-btn" style="padding: 12px; font-size: 16px;">Yeni Hesap Oluştur</button>
        
        <p style="font-size: 12px; color: var(--text-gray); margin-top: 20px;">Sisteme giriş için e-posta onayı gereklidir.</p>
    </div>

    <div id="register-card" style="display: none;"></div>
    <div id="verify-card" style="display: none;"></div>
</div>

<div id="app-screen" style="display: none;">
    <header id="app-header">
        <div class="logo-area">
            <div id="mobile-menu-btn" style="display: none;">☰</div>
            <div class="logo" id="logo-btn" onclick="window.loadPage('home')" style="cursor:pointer;">🌍 UniLoop</div>
        </div>
        <div class="header-right-menu" style="display: flex; align-items: center; gap: 12px;">
            <div class="menu-item premium-glow" id="nav-premium-action" style="background: linear-gradient(135deg, #F59E0B, #D97706); color: white; font-weight: bold; cursor: pointer; padding: 6px 14px; border-radius: 20px; font-size: 13px; display: inline-flex; align-items: center; box-shadow: 0 2px 4px rgba(245, 158, 11, 0.4);" onclick="window.openPremiumModal()">
                🌟 Premium
            </div>
            <div id="notif-btn-top" onclick="window.loadPage('notifications')" style="position: relative; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; background: #F3F4F6; width: 36px; height: 36px; border-radius: 50%; transition: 0.2s;" title="Bildirimler">
                🔔 
                <span id="notif-badge-top" style="display:none; position:absolute; top:-2px; right:-2px; background:#EF4444; color:white; border-radius:50%; width:16px; height:16px; font-size:10px; align-items:center; justify-content:center; font-weight:bold; border:2px solid white;">0</span>
            </div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar" id="sidebar" style="display: none;">
            <div class="sidebar-top">
                <h3>Navigasyon</h3>
                <div class="menu-item active" data-target="home">🏠 Ana Sayfa</div>
                <div class="menu-item" data-target="loopmap">📍 LoopMap</div>
                <div class="menu-item" data-target="market">🛒 Kampüs Market</div>
                <div class="menu-item" data-target="confessions">🤫 Anonim Kampüs</div>
                <div class="menu-item" data-target="qa">❓ Soru & Cevap</div>
                
                <br>
                <h3>Bana Özel</h3>
                <div class="menu-item" id="nav-messages-btn" data-target="messages">💬 Mesajlarım <span id="msg-badge" class="badge" style="display:none;">0</span></div>
                
                <div id="sidebar-networks-container"></div>
            </div>
            
            <div class="sidebar-bottom">
                <div class="menu-item" data-target="settings">⚙️ Ayarlar</div>
            </div>
        </aside>

        <main class="main-feed" id="main-content"></main>

        <aside class="right-panel" style="display:none;">
            <div class="card sticky-card" style="padding: 15px;">
                <div id="right-networks-container"></div>
            </div>
        </aside>
    </div>
</div>

<div id="app-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">Başlık</h3>
            <span class="close-btn" id="modal-close">&times;</span>
        </div>
        <div class="modal-body" id="modal-body"></div>
    </div>
</div>

<div id="lightbox" class="lightbox">
    <span class="lightbox-close" onclick="window.closeLightbox()">&times;</span>
    <span class="lightbox-counter" id="lightbox-counter">1/3</span>
    <button class="lightbox-prev" onclick="window.changeLightboxImage(-1)">&#10094;</button>
    <img class="lightbox-content" id="lightbox-img" src="">
    <button class="lightbox-next" onclick="window.changeLightboxImage(1)">&#10095;</button>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
