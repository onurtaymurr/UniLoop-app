<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>UniLoop — Kampüste Tanış</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─── PREMIUM TOKENS ─── */
:root {
  --bg: #0f1015;           
  --surface: #1a1b26;      
  --surface-hover: #232533;
  --primary: #ff4b72;      
  --primary-grad: linear-gradient(135deg, #ff4b72, #ff7657);
  --secondary: #8b5cf6;    
  --text: #ffffff;
  --text-muted: #94a3b8;
  --border: rgba(255, 255, 255, 0.08);
  --success: #10b981;
  --warning: #f59e0b;
  --app-max: 430px;        
  --nav-height: 65px;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; overflow: hidden; background: #000; -webkit-font-smoothing: antialiased; display: flex; justify-content: center; }
body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); }

/* ─── APP CONTAINER ─── */
#app-container {
  width: 100%; max-width: var(--app-max); height: 100dvh;
  background: var(--bg); position: relative; overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.8); display: flex; flex-direction: column;
}

/* ═══════════════════════════════════
   SCREENS & COMPONENTS
═══════════════════════════════════ */
.screen { display: none; flex-direction: column; height: 100%; width: 100%; overflow-y: auto; scrollbar-width: none; position: relative; z-index: 1; }
.screen::-webkit-scrollbar { display: none; }
.screen.show { display: flex; animation: fadeScreen 0.3s ease; }
@keyframes fadeScreen { from { opacity: 0; } to { opacity: 1; } }

/* ─── COMMON UI ─── */
.btn-primary { width: 100%; padding: 16px; border: none; border-radius: 16px; background: var(--primary-grad); color: #fff; font-family: inherit; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 20px rgba(255,75,114,0.3); display: flex; justify-content: center; align-items: center; gap: 8px; }
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled { opacity: 0.6; pointer-events: none; box-shadow: none; }
.btn-outline { width: 100%; padding: 16px; border: 1px solid var(--border); border-radius: 16px; background: transparent; color: var(--text); font-family: inherit; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
.btn-outline:active { background: var(--surface); }

/* ─── TOPBAR (Premium Header) ─── */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: rgba(15,16,21,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 50; flex-shrink: 0; padding-top: max(16px, env(safe-area-inset-top)); }
.tb-logo { display: flex; align-items: center; gap: 8px; font-size: 1.2rem; font-weight: 800; background: var(--primary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.tb-actions { display: flex; gap: 12px; align-items: center; }
.tb-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: var(--text); }
.tb-icon:active { transform: scale(0.9); }
.tb-icon svg { width: 18px; height: 18px; fill: currentColor; }
.tb-premium { color: var(--warning); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.1); }

/* ─── BOTTOM NAV (SVG Icons) ─── */
.bottom-nav { display: flex; justify-content: space-around; align-items: center; height: var(--nav-height); padding-bottom: env(safe-area-inset-bottom); background: rgba(15,16,21,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); flex-shrink: 0; z-index: 50; }
.nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); cursor: pointer; transition: 0.2s; width: 60px; height: 100%; position: relative; }
.nav-item.on { color: var(--primary); }
.nav-icon { transition: 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: center; justify-content: center; }
.nav-icon svg { width: 26px; height: 26px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.nav-item.on .nav-icon { transform: scale(1.15); }
.nav-item.on .nav-icon svg { fill: currentColor; }
.nav-badge { position: absolute; top: 12px; right: 14px; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); display: none; border: 2px solid var(--bg); }
.nav-badge.show { display: block; }

/* ─── AUTH & SETUP ─── */
.auth-wrap { padding: 32px 24px; display: flex; flex-direction: column; justify-content: center; min-height: 100%; }
.input-group { margin-bottom: 16px; }
.input-label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.input-field { width: 100%; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; color: var(--text); font-family: inherit; font-size: 0.95rem; outline: none; transition: 0.2s; }
.input-field:focus { border-color: var(--primary); background: var(--surface-hover); }

/* ─── SWIPE PANEL ─── */
#pSwipe { padding: 16px; display: flex; flex-direction: column; }
.card-stack { position: relative; flex: 1; width: 100%; margin-bottom: 20px; perspective: 1000px; }
.swipe-card { position: absolute; inset: 0; border-radius: 24px; overflow: hidden; background: var(--surface); box-shadow: 0 10px 40px rgba(0,0,0,0.6); border: 1px solid var(--border); cursor: grab; touch-action: none; will-change: transform; display: flex; flex-direction: column; }
.swipe-card.f { z-index: 3; }
.swipe-card.b1 { z-index: 2; transform: scale(0.95) translateY(16px); opacity: 0.9; pointer-events: none; }
.c-image { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 7.5rem; background-color: var(--surface-hover); background-size: cover; background-position: center; position: relative; }
.c-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 50%); }
.c-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px; z-index: 2; }
.c-name-age { font-size: 1.8rem; font-weight: 800; color: #fff; margin-bottom: 4px; display: flex; align-items: baseline; gap: 8px; }
.c-bio { font-size: 0.9rem; color: rgba(255,255,255,0.9); line-height: 1.5; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.action-bar { display: flex; justify-content: center; align-items: center; gap: 24px; padding-bottom: 10px; flex-shrink: 0; }
.act-btn { border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; background: var(--surface); border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.act-btn:active { transform: scale(0.9); }
.act-btn.nope { width: 60px; height: 60px; color: var(--primary); }
.act-btn.like { width: 72px; height: 72px; color: var(--success); }
.act-btn.super { width: 50px; height: 50px; color: var(--secondary); }
.act-btn svg { width: 40%; height: 40%; fill: currentColor; }
.act-btn.like svg { width: 45%; height: 45%; }

/* ─── POPÜLERLİK SAVAŞI (FACE MASH) ─── */
#pBattle { padding: 20px 16px; display: flex; flex-direction: column; }
.battle-header { text-align: center; margin-bottom: 24px; }
.battle-title { font-size: 1.6rem; font-weight: 800; color: var(--warning); margin-bottom: 4px; }
.battle-sub { font-size: 0.85rem; color: var(--text-muted); }
.battle-arena { flex: 1; display: flex; flex-direction: column; gap: 16px; justify-content: center; }
.battle-card { flex: 1; border-radius: 20px; overflow: hidden; position: relative; cursor: pointer; border: 2px solid transparent; transition: 0.2s; background-size: cover; background-position: center; background-color: var(--surface-hover); min-height: 200px; display: flex; align-items: flex-end; }
.battle-card:active { transform: scale(0.97); }
.battle-card.winner { border-color: var(--success); box-shadow: 0 0 30px rgba(16,185,129,0.3); }
.bc-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%); z-index: 1; }
.bc-info { position: relative; z-index: 2; padding: 20px; width: 100%; text-align: center; }
.bc-name { font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: 4px; }
.bc-score { font-size: 0.85rem; color: var(--warning); font-weight: 700; background: rgba(245,158,11,0.2); padding: 4px 12px; border-radius: 12px; display: inline-block; }
.vs-badge { width: 44px; height: 44px; border-radius: 50%; background: var(--bg); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; color: var(--text-muted); margin: 0 auto; position: relative; z-index: 10; margin-top: -30px; margin-bottom: -30px; }

/* ─── PROFILE PANEL (Detailed) ─── */
#pProfile { padding: 20px 16px; }
.p-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; position: relative; }
.p-avatar-wrap { position: relative; margin-bottom: 16px; }
.p-avatar { width: 120px; height: 120px; border-radius: 50%; background-color: var(--surface-hover); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; border: 4px solid var(--bg); box-shadow: 0 0 0 2px var(--primary), 0 10px 20px rgba(0,0,0,0.5); }
.p-upload-btn { position: absolute; bottom: 0; right: 0; width: 36px; height: 36px; background: var(--primary); border: 3px solid var(--bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; }
.p-upload-btn svg { width: 16px; height: 16px; fill: currentColor; }
.p-name { font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }

.p-stats { display: flex; background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 24px; border: 1px solid var(--border); }
.p-stat { flex: 1; text-align: center; border-right: 1px solid var(--border); }
.p-stat:last-child { border-right: none; }
.p-stat-val { font-size: 1.4rem; font-weight: 800; margin-bottom: 4px; }
.p-stat-lbl { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

.p-menu { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 24px; }
.p-menu-item { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid var(--border-light); cursor: pointer; transition: 0.2s; }
.p-menu-item:active { background: var(--surface-hover); }
.pm-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; margin-right: 12px; color: var(--text-muted); }
.pm-icon svg { width: 16px; height: 16px; fill: currentColor; }
.pm-label { flex: 1; font-size: 0.95rem; font-weight: 600; }

/* ─── ANON RADAR OVERLAY ─── */
.radar-ov { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 200; flex-direction: column; align-items: center; justify-content: center; }
.radar-ov.show { display: flex; animation: fadeScreen 0.3s ease; }
.radar-circle { width: 150px; height: 150px; border-radius: 50%; background: rgba(139,92,246,0.2); border: 2px solid var(--secondary); display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; margin-bottom: 40px; }
.radar-pulse { position: absolute; inset: -50px; border-radius: 50%; border: 2px solid var(--secondary); opacity: 0; animation: pulsing 2s infinite; }
@keyframes pulsing { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(1.5); opacity: 0; } }
.radar-text { font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 10px; }
.radar-sub { color: var(--text-muted); font-size: 0.9rem; }
.btn-cancel { margin-top: 40px; background: transparent; border: 1px solid var(--border); color: var(--text); padding: 12px 30px; border-radius: 20px; font-weight: 600; cursor: pointer; }

/* ─── MESSAGES ─── */
#pMessages { padding: 0; }
.chat-row { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border-bottom: 1px solid var(--border-light); cursor: pointer; transition: 0.2s; }
.chat-row:active { background: var(--surface); }
.cr-av { width: 56px; height: 56px; border-radius: 50%; background-color: var(--surface-hover); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; flex-shrink: 0; }
.cr-info { flex: 1; min-width: 0; }
.cr-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
.cr-name { font-weight: 700; font-size: 1rem; color: var(--text); }
.cr-msg { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Active Chat */
#chatView { display: none; flex-direction: column; position: absolute; inset: 0; background: var(--bg); z-index: 100; }
.cv-header { display: flex; align-items: center; padding: 16px; background: rgba(15,16,21,0.95); border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 12px; padding-top: max(16px, env(safe-area-inset-top)); }
.cv-back { background: transparent; border: none; color: var(--text); font-size: 1.8rem; cursor: pointer; }
.cv-av { width: 40px; height: 40px; border-radius: 50%; background-size: cover; background-position: center; background-color: var(--surface-hover); }
.cv-msgs { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; }
.msg.me { align-self: flex-end; background: var(--primary-grad); color: #fff; border-bottom-right-radius: 4px; }
.msg.them { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

.cv-input { display: flex; gap: 10px; padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
.cv-input input { flex: 1; background: var(--bg); border: 1px solid var(--border); padding: 14px 16px; border-radius: 24px; color: var(--text); outline: none; }
.cv-input button { width: 48px; height: 48px; border-radius: 50%; background: var(--primary-grad); border: none; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* ─── TOASTS ─── */
.toast-container { position: absolute; top: env(safe-area-inset-top, 20px); left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 300; pointer-events: none; }
.toast { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px 24px; border-radius: 30px; font-size: 0.9rem; font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.5); animation: dropIn 0.3s; }
@keyframes dropIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.toast.out { animation: dropOut 0.3s forwards; }
@keyframes dropOut { to { opacity: 0; } }

/* Dosya Yükleme Inputu Gizli */
#fileInput { display: none; }
</style>
</head>
<body>

<div id="app-container">
  <div class="toast-container" id="toastWrap"></div>

  <div class="screen show" id="pgAuth">
    <div class="auth-wrap">
      <div class="auth-title">UniLoop</div>
      <p class="auth-sub">Kampüste gerçek bağlantılar kur.</p>
      
      <div class="tabs">
        <button class="tab on" id="tabLogin" onclick="authTab('login')">Giriş Yap</button>
        <button class="tab" id="tabReg" onclick="authTab('reg')">Kayıt Ol</button>
      </div>
      
      <div id="fLogin">
        <div class="input-group"><label class="input-label">E-posta</label><input type="email" class="input-field" id="lEmail" placeholder="ornek@edu.tr"></div>
        <div class="input-group"><label class="input-label">Şifre</label><input type="password" class="input-field" id="lPass" placeholder="••••••••"></div>
        <button class="btn-primary" id="btnLogin" onclick="doLogin()">Giriş Yap</button>
      </div>
      
      <div id="fReg" style="display:none">
        <div class="input-group"><label class="input-label">Ad Soyad</label><input type="text" class="input-field" id="rName" placeholder="Adın Soyadın"></div>
        <div class="input-group"><label class="input-label">E-posta</label><input type="email" class="input-field" id="rEmail" placeholder="ornek@edu.tr"></div>
        <div class="input-group"><label class="input-label">Şifre</label><input type="password" class="input-field" id="rPass" placeholder="En az 6 karakter"></div>
        <div class="input-group"><label class="input-label">Üniversite</label>
          <select class="input-field" id="rUni"><option value="">Seçim Yap...</option><option>Boğaziçi</option><option>İTÜ</option><option>ODTÜ</option><option>Diğer</option></select>
        </div>
        <button class="btn-primary" id="btnReg" onclick="doRegister()">Hesap Oluştur</button>
      </div>
      <div class="err-msg" id="authErr"></div>
    </div>
  </div>

  <div class="screen" id="appShell">
    
    <div class="topbar">
      <div class="tb-logo">UniLoop</div>
      <div class="tb-actions">
        <div class="tb-icon tb-premium" onclick="toast('Premium özellikleri yakında!','info')">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div class="tb-icon" onclick="toast('Bildirim yok','info')">
          <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </div>
      </div>
    </div>

    <div class="content-area">
      
      <div class="panel on" id="pSwipe">
        <div class="card-stack" id="cardStack"></div>
        <div class="action-bar">
          <button class="act-btn nope" onclick="swipe('left')">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
          <button class="act-btn super" onclick="swipe('up')">
            <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          </button>
          <button class="act-btn like" onclick="swipe('right')">
            <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
          </button>
        </div>
      </div>

      <div class="panel" id="pBattle">
        <div class="battle-header">
          <div class="battle-title">Popülerlik Savaşı</div>
          <div class="battle-sub">Kampüsün en popüleri kim? Tıkla ve seç!</div>
        </div>
        <div class="battle-arena" id="battleArena">
          </div>
      </div>

      <div class="panel" id="pMessages">
        <div class="chat-list" id="chatList"></div>
      </div>

      <div class="panel" id="pProfile">
        <input type="file" id="fileInput" accept="image/*" onchange="uploadAvatar(event)">
        <div class="p-header">
          <div class="p-avatar-wrap">
            <div class="p-avatar" id="pPic">😎</div>
            <div class="p-upload-btn" onclick="document.getElementById('fileInput').click()">
              <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </div>
          </div>
          <div class="p-name" id="pName">Kullanıcı</div>
          <div class="p-bio" id="pSchool">Üniversite</div>
        </div>
        
        <div class="p-stats">
          <div class="p-stat"><div class="p-stat-val" id="stLikes">0</div><div class="p-stat-lbl">Beğeni</div></div>
          <div class="p-stat"><div class="p-stat-val" id="stMatches">0</div><div class="p-stat-lbl">Eşleşme</div></div>
          <div class="p-stat"><div class="p-stat-val" id="stScore">0</div><div class="p-stat-lbl">Popülerlik</div></div>
        </div>

        <div class="p-menu">
          <div class="p-menu-item" onclick="editBio()">
            <div class="pm-icon"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></div>
            <span class="pm-label">Bio Düzenle</span><span class="pm-arrow">›</span>
          </div>
          <div class="p-menu-item" onclick="doLogout()">
            <div class="pm-icon" style="color:var(--primary)"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></div>
            <span class="pm-label" style="color:var(--primary)">Çıkış Yap</span>
          </div>
        </div>
      </div>

      <div id="chatView">
        <div class="cv-header">
          <button class="cv-back" onclick="closeChat()">‹</button>
          <div class="cv-av" id="ctAvi">🌙</div>
          <div class="cv-info">
            <div class="cv-name" id="ctName">İsim</div>
            <div class="cv-status">Çevrimiçi</div>
          </div>
        </div>
        <div class="cv-msgs" id="chatMsgs"></div>
        <div class="cv-input">
          <input type="text" id="chatInp" placeholder="Mesaj yaz..." onkeydown="if(event.key==='Enter')sendMsg()">
          <button onclick="sendMsg()">↑</button>
        </div>
      </div>

    </div>

    <div class="bottom-nav">
      <div class="nav-item on" id="nav-swipe" onclick="goPanel('swipe')">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg></div>
      </div>
      <div class="nav-item" id="nav-anon" onclick="startAnonSearch()">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg></div>
      </div>
      <div class="nav-item" id="nav-battle" onclick="goPanel('battle')">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5S20 10 17.5 10c-1 0-2 .5-2.5 1-.5-.5-1.5-1-2.5-1-2.5 0-4.5 2-4.5 4.5S10 19 12.5 19H17.5z"></path><path d="M2 12c0 4.4 3.6 8 8 8s8-3.6 8-8-3.6-8-8-8-8 3.6-8 8z"></path></svg></div>
      </div>
      <div class="nav-item" id="nav-messages" onclick="goPanel('messages')">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></div>
      </div>
      <div class="nav-item" id="nav-profile" onclick="goPanel('profile')">
        <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></div>
      </div>
    </div>
  </div>

  <div class="radar-ov" id="radarOv">
    <div class="radar-circle">
      🎭
      <div class="radar-pulse"></div>
    </div>
    <div class="radar-text">Anonim Aranıyor...</div>
    <div class="radar-sub">Yakındaki sesli kullanıcılar taranıyor</div>
    <button class="btn-cancel" onclick="cancelAnon()">İptal Et</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
'use strict';

/* ════════════════════════════════════════════
   FIREBASE INIT
════════════════════════════════════════════ */
firebase.initializeApp({
  apiKey:"AIzaSyDukYf45XqFM-trtEY2MdTY8thd8iXl20I",
  authDomain:"uniloop-app.firebaseapp.com",
  projectId:"uniloop-app",
  storageBucket:"uniloop-app.firebasestorage.app",
  messagingSenderId:"272654005890",
  appId:"1:272654005890:web:0b1dd388364e86d22f269b"
});
var auth = firebase.auth();
var db   = firebase.firestore();
var storage = firebase.storage();
var FS   = firebase.firestore.FieldValue;

/* STATE */
var ME = null, PROF = null;
var swipePool = [], swipeIdx = 0;
var battleUsers = [];
var currentChatId = null, unsubMsgs = null;

/* ════════════════════════════════════════════
   AUTH
════════════════════════════════════════════ */
auth.onAuthStateChanged(function(user){
  if(user){
    ME = user;
    db.collection('users').doc(user.uid).get().then(function(s){
      if(s.exists){
        PROF = s.data();
        launchApp();
      } else {
        PROF = {name:user.displayName||'', email:user.email||'', avatar:'😎', popScore:0, likes:0, matchCount:0};
        db.collection('users').doc(user.uid).set(PROF, {merge:true});
        launchApp();
      }
    });
  } else {
    ME=null; PROF=null; showScreen('pgAuth');
  }
});

function authTab(t){
  document.getElementById('fLogin').style.display = t==='login'?'':'none';
  document.getElementById('fReg').style.display   = t==='reg'?'':'none';
  document.getElementById('tabLogin').classList.toggle('on', t==='login');
  document.getElementById('tabReg').classList.toggle('on', t==='reg');
}

function doLogin(){
  var e=gv('lEmail'), p=gv('lPass'), err=document.getElementById('authErr');
  if(!e||!p){err.textContent='E-posta ve şifre zorunlu.'; err.classList.add('show'); return;}
  auth.signInWithEmailAndPassword(e,p).catch(function(ex){err.textContent='Giriş başarısız.'; err.classList.add('show');});
}

function doRegister(){
  var n=gv('rName'), e=gv('rEmail'), p=gv('rPass'), u=gv('rUni'), err=document.getElementById('authErr');
  if(!n||!e||!p){err.textContent='Tüm alanları doldurun.'; err.classList.add('show'); return;}
  auth.createUserWithEmailAndPassword(e,p).then(function(c){
    c.user.updateProfile({displayName:n});
    db.collection('users').doc(c.user.uid).set({name:n, email:e, uni:u, avatar:'😎', popScore:0, likes:0, matchCount:0, createdAt:FS.serverTimestamp()});
  }).catch(function(ex){err.textContent='Kayıt başarısız.'; err.classList.add('show');});
}

function doLogout(){ auth.signOut(); }

/* ════════════════════════════════════════════
   APP LAUNCH & NAV
════════════════════════════════════════════ */
function launchApp(){
  showScreen('appShell');
  updateProfileUI();
  buildSwipe();
  loadMatches();
  loadBattleUsers();
}

function updateProfileUI(){
  var av = PROF.photoURL ? `url(${PROF.photoURL})` : '';
  var avEl = document.getElementById('pPic');
  if(av) { avEl.style.backgroundImage = av; avEl.textContent = ''; } 
  else { avEl.textContent = PROF.avatar||'😎'; avEl.style.backgroundImage = 'none'; }
  
  document.getElementById('pName').textContent = PROF.name;
  document.getElementById('pSchool').textContent = PROF.uni || 'Üniversite belirtilmemiş';
  document.getElementById('stLikes').textContent = PROF.likes||0;
  document.getElementById('stMatches').textContent = PROF.matchCount||0;
  document.getElementById('stScore').textContent = PROF.popScore||0;
}

function goPanel(name){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.nav-item').forEach(function(s){s.classList.remove('on');});
  document.getElementById('p'+cap(name)).classList.add('on');
  try{document.getElementById('nav-'+name).classList.add('on');}catch(e){}
  if(name==='messages') loadMatches();
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

/* ════════════════════════════════════════════
   FOTOĞRAF YÜKLEME (STORAGE)
════════════════════════════════════════════ */
function uploadAvatar(e){
  var file = e.target.files[0];
  if(!file) return;
  toast('Fotoğraf yükleniyor...','info');
  var ref = storage.ref('avatars/' + ME.uid + '_' + Date.now());
  ref.put(file).then(function(snapshot){
    snapshot.ref.getDownloadURL().then(function(url){
      PROF.photoURL = url;
      db.collection('users').doc(ME.uid).update({photoURL: url});
      updateProfileUI();
      toast('Fotoğraf güncellendi!','success');
    });
  }).catch(function(){toast('Yükleme başarısız.','error');});
}

function editBio(){
  var nb=prompt('Kendini kısaca tanıt:',PROF.bio||'');
  if(nb!==null){ PROF.bio=nb; db.collection('users').doc(ME.uid).update({bio:nb}); toast('Güncellendi!','success'); }
}

/* ════════════════════════════════════════════
   SWIPE PANEL
════════════════════════════════════════════ */
function buildSwipe(){
  db.collection('users').limit(20).get().then(function(uSnap){
    var real=[];
    uSnap.forEach(function(d){ if(d.id !== ME.uid) real.push(Object.assign({id:d.id},d.data())); });
    swipePool = real; shuf(swipePool); swipeIdx = 0; renderCards();
  });
}

function renderCards(){
  var stack=document.getElementById('cardStack');
  if(!swipePool.length){ stack.innerHTML='<div class="empty-state"><span>🎉</span><h3>Hepsi bu kadar!</h3><p>Çevrendeki herkesi gördün.</p></div>'; return; }
  stack.innerHTML='';
  for(var i=Math.min(2,swipePool.length-1);i>=0;i--){
    var p=swipePool[(swipeIdx+i)%swipePool.length];
    var cls=i===0?'f':i===1?'b1':'b2';
    var bg = p.photoURL ? `background-image:url(${p.photoURL}); font-size:0;` : '';
    
    var el=document.createElement('div'); el.className='swipe-card '+cls;
    el.innerHTML=`<div class="c-image" style="${bg}">${p.photoURL?'':(p.avatar||'😎')}<div class="c-overlay"></div></div>
      <div class="stamp lk">BEĞEN</div><div class="stamp np">PAS</div><div class="stamp sp">SÜPER</div>
      <div class="c-info">
        <div class="c-name-age">${p.name||'Kullanıcı'}</div>
        <div class="c-school">🎓 ${p.uni||''}</div>
        <div class="c-bio">${p.bio||''}</div>
      </div>`;
    stack.appendChild(el);
  }
  setupDrag(stack.querySelector('.swipe-card.f'));
}

var D={on:0,sx:0,sy:0,cx:0,cy:0};
function setupDrag(el){
  if(!el)return;
  el.addEventListener('mousedown',function(e){D={on:1,sx:e.clientX,sy:e.clientY,cx:0,cy:0};el.style.transition='none';},{passive:true});
  el.addEventListener('touchstart',function(e){D={on:1,sx:e.touches[0].clientX,sy:e.touches[0].clientY,cx:0,cy:0};el.style.transition='none';},{passive:true});
}
document.addEventListener('mousemove',function(e){onDrag(e.clientX,e.clientY);});
document.addEventListener('touchmove',function(e){onDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
document.addEventListener('mouseup',endDrag);
document.addEventListener('touchend',endDrag);

function onDrag(x,y){
  if(!D.on)return; D.cx=x-D.sx; D.cy=y-D.sy;
  var c=document.querySelector('.swipe-card.f'); if(!c)return;
  c.style.transform=`translate(${D.cx}px, ${D.cy}px) rotate(${D.cx*0.05}deg)`;
  c.querySelector('.stamp.lk').style.opacity = D.cx>20 ? Math.min(D.cx/100,1) : 0;
  c.querySelector('.stamp.np').style.opacity = D.cx<-20 ? Math.min(Math.abs(D.cx)/100,1) : 0;
}
function endDrag(){
  if(!D.on)return; var dx=D.cx; D.on=0; D.cx=0; D.cy=0;
  var c=document.querySelector('.swipe-card.f'); if(!c)return;
  c.style.transition='transform .4s cubic-bezier(.25,.46,.45,.94)';
  if(dx>90)swipe('right'); else if(dx<-90)swipe('left');
  else{c.style.transform='';c.querySelectorAll('.stamp').forEach(function(s){s.style.opacity=0;});}
}

function swipe(dir){
  var front=document.querySelector('.swipe-card.f');
  if(!front||front._anim)return; front._anim=1;
  var p=swipePool[swipeIdx%swipePool.length];
  front.style.transition='transform .5s ease,opacity .5s ease';
  
  if(dir==='right'){ front.style.transform='translate(180%,-50px) rotate(25deg)'; checkRealMatch(p); } 
  else if(dir==='left'){ front.style.transform='translate(-180%,-50px) rotate(-25deg)'; }
  else { front.style.transform='translate(0,-200%)'; checkRealMatch(p); }
  
  swipePool.splice(swipeIdx % swipePool.length, 1);
  setTimeout(function(){ renderCards(); }, 400);
}

function checkRealMatch(p) {
  db.collection('swipes').add({from:ME.uid, to:p.id, ts:FS.serverTimestamp()});
  // Simüle edilmiş %30 eşleşme ihtimali (Canlıda sadece db kontrolü yapılmalı)
  if(Math.random() < 0.3) {
    var cid=[ME.uid,p.id].sort().join('_');
    db.collection('matches').doc(cid).set({
      users:[ME.uid,p.id],
      user1:{uid:ME.uid, name:PROF.name, avatar:PROF.photoURL||PROF.avatar},
      user2:{uid:p.id, name:p.name, avatar:p.photoURL||p.avatar},
      createdAt:FS.serverTimestamp(), lastMsg:null, lastTs:FS.serverTimestamp()
    },{merge:true});
    toast('Eşleşme sağlandı!','success');
  } else {
    toast('Beğenildi!','success');
  }
}

/* ════════════════════════════════════════════
   POPÜLERLİK SAVAŞI (FACE MASH)
════════════════════════════════════════════ */
function loadBattleUsers() {
  db.collection('users').where('photoURL','!=',null).limit(20).get().then(function(s){
    var usrs = [];
    s.forEach(function(d){ if(d.id !== ME.uid) usrs.push(Object.assign({id:d.id}, d.data())); });
    battleUsers = usrs;
    renderBattle();
  });
}

function renderBattle() {
  var arena = document.getElementById('battleArena');
  if(battleUsers.length < 2) {
    arena.innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top:40px;">Savaş için yeterli fotoğraflı kullanıcı yok. Fotoğraf yükleyerek ilk sen katıl!</div>';
    return;
  }
  shuf(battleUsers);
  var u1 = battleUsers[0], u2 = battleUsers[1];
  
  arena.innerHTML = `
    <div class="battle-card" style="background-image:url(${u1.photoURL})" onclick="castPopVote('${u1.id}')">
      <div class="bc-overlay"></div>
      <div class="bc-info"><div class="bc-name">${u1.name.split(' ')[0]}</div><div class="bc-score">${u1.popScore||0} Puan</div></div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="battle-card" style="background-image:url(${u2.photoURL})" onclick="castPopVote('${u2.id}')">
      <div class="bc-overlay"></div>
      <div class="bc-info"><div class="bc-name">${u2.name.split(' ')[0]}</div><div class="bc-score">${u2.popScore||0} Puan</div></div>
    </div>
  `;
}

function castPopVote(winnerId) {
  db.collection('users').doc(winnerId).update({popScore: FS.increment(1)});
  toast('Oyun kaydedildi!','success');
  // Kısa bekleme ve yeni savaş
  setTimeout(renderBattle, 600);
}

/* ════════════════════════════════════════════
   ANON RADAR (SESLİ ARAMA)
════════════════════════════════════════════ */
function startAnonSearch() {
  document.getElementById('radarOv').classList.add('show');
  setTimeout(function(){
    document.getElementById('radarOv').classList.remove('show');
    toast('Şu an anonim bekleyen kullanıcı yok.', 'error');
  }, 4000);
}
function cancelAnon() { document.getElementById('radarOv').classList.remove('show'); }

/* ════════════════════════════════════════════
   MESSAGES
════════════════════════════════════════════ */
function loadMatches(){
  db.collection('matches').where('users','array-contains',ME.uid).get()
    .then(function(snap){
      allChats=[];
      snap.forEach(function(d){
        var data=d.data();
        var other=data.user1.uid===ME.uid?data.user2:data.user1;
        allChats.push({
          chatId:d.id, name:other.name, avatar:other.avatar||'😎',
          lastMsg:data.lastMsg, lastTs:data.lastTs&&data.lastTs.toMillis?data.lastTs.toMillis():Date.now()
        });
      });
      allChats.sort(function(a,b){return b.lastTs-a.lastTs;});
      renderChats(allChats);
    });
}

function renderChats(list){
  var chatEl=document.getElementById('chatList');
  if(!list.length){ chatEl.innerHTML='<div style="text-align:center;padding:40px;color:var(--text-muted)">Henüz mesaj yok.</div>'; return; }
  chatEl.innerHTML=list.map(function(c){
    var bg = c.avatar.includes('http') ? `background-image:url(${c.avatar}); font-size:0;` : '';
    return `<div class="chat-row" onclick="openChat('${c.chatId}', '${c.name}', '${c.avatar}')">
      <div class="cr-av" style="${bg}">${c.avatar.includes('http')?'':c.avatar}</div>
      <div class="cr-info">
        <div class="cr-top"><div class="cr-name">${c.name}</div></div>
        <div class="cr-msg">${c.lastMsg||'Sohbete başla'}</div>
      </div></div>`;
  }).join('');
}

function openChat(chatId, name, avatar){
  currentChatId=chatId;
  var cv = document.getElementById('chatView'); cv.style.display='flex';
  document.getElementById('ctName').textContent=name;
  var avEl = document.getElementById('ctAvi');
  if(avatar.includes('http')){ avEl.style.backgroundImage=`url(${avatar})`; avEl.textContent=''; }
  else { avEl.style.backgroundImage='none'; avEl.textContent=avatar; }
  
  if(unsubMsgs)unsubMsgs();
  unsubMsgs=db.collection('messages').where('chatId','==',chatId).orderBy('ts','asc').onSnapshot(function(s){
    var msgs=[]; s.forEach(function(d){msgs.push(d.data());});
    var c=document.getElementById('chatMsgs');
    c.innerHTML=msgs.map(function(m){
      return `<div class="msg ${m.from===ME.uid?'me':'them'}"><div class="msg-bubble">${esc(m.text)}</div></div>`;
    }).join('');
    c.scrollTop=c.scrollHeight;
  });
}
function closeChat(){ document.getElementById('chatView').style.display='none'; currentChatId=null; if(unsubMsgs)unsubMsgs(); loadMatches(); }

function sendMsg(){
  if(!currentChatId)return; var i=document.getElementById('chatInp'), t=i.value.trim(); if(!t)return; i.value='';
  db.collection('messages').add({chatId:currentChatId,from:ME.uid,text:t,ts:FS.serverTimestamp()});
  db.collection('matches').doc(currentChatId).update({lastMsg:t,lastTs:FS.serverTimestamp()});
}

/* UTILS */
function showScreen(id){ document.querySelectorAll('.screen').forEach(function(p){p.classList.remove('show');}); document.getElementById(id).classList.add('show'); }
function gv(id){return document.getElementById(id).value.trim();}
function showErr(el,msg){el.textContent=msg;el.classList.add('show');}
function setBtnLoad(id,loading,label){var b=document.getElementById(id);b.disabled=loading;b.innerHTML=loading?'<span class="spinner"></span>':label;}
function shuf(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,type){
  var w=document.getElementById('toastWrap'), el=document.createElement('div'); el.className='toast'; el.textContent=msg; w.appendChild(el);
  setTimeout(function(){el.classList.add('out');setTimeout(function(){try{el.remove();}catch(e){}},300);},3000);
}
</script>
</body>
