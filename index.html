<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniLoop - Global Campus Network</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        #main-content { padding-bottom: calc(80px + env(safe-area-inset-bottom)) !important; }

        body.no-scroll-messages #main-content, body.game-active #main-content {
            position: fixed !important;
            top: 50px !important; 
            bottom: calc(65px + env(safe-area-inset-bottom)) !important; 
            left: 0 !important;
            right: 0 !important;
            padding-bottom: 0 !important; 
            height: auto !important;
            overflow: hidden !important; 
            z-index: 40;
        }

        .bottom-nav {
            align-items: flex-end !important; 
            padding-bottom: calc(env(safe-area-inset-bottom) + 8px) !important;
            padding-top: 5px !important;
            z-index: 99999 !important; 
        }
        .bottom-nav-item { justify-content: flex-end !important; gap: 2px !important; }
        .bottom-nav-icon { margin-bottom: 2px !important; margin-top: 4px !important; }
        
        .premium-glow { animation: glowPulse 2s infinite alternate; }
        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px rgba(17, 24, 39, 0.2); }
            100% { box-shadow: 0 0 15px rgba(17, 24, 39, 0.5); }
        }

        /* OYUN İÇİN CSS EKLENTİLERİ */
        #campus-challenge-view { background: #F9FAFB; overflow: hidden; }
        #gameCanvas { display: block; width: 100%; height: 100%; touch-action: none; }
        .game-ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .game-leaderboard { pointer-events: auto; position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.95); border: 2px solid #111827; padding: 10px; border-radius: 12px; width: 160px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 100; }
        .game-leaderboard h4 { margin-bottom: 8px; font-size: 13px; color: #111827; border-bottom: 1px solid #E5E7EB; padding-bottom: 5px; display: flex; align-items: center; gap: 5px; }
        .game-score-display { position: absolute; top: 15px; left: 15px; background: white; border: 2px solid #111827; padding: 8px 15px; border-radius: 12px; font-weight: 900; font-size: 16px; color: #111827; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .game-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(249, 250, 251, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; z-index: 150; pointer-events: auto; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="login-card">
        <div class="auth-logo" style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <img src="uniloop-logo.png" alt="UniLoop" style="width: 100%; max-width: 240px; height: auto; object-fit: contain; display: block;">
        </div>

        <p class="auth-subtitle">Kampüs ağına giriş yap, döngüde kal.</p>
        
        <div class="form-group">
            <input type="email" id="login-email" placeholder="E-posta Adresiniz">
        </div>
        <div class="form-group" style="margin-bottom: 8px;">
            <input type="password" id="login-password" placeholder="Şifren">
        </div>
        
        <div style="text-align: right; margin-bottom: 20px;">
            <span id="forgot-password-btn" style="font-size: 13px; color: var(--text-dark); cursor: pointer; font-weight: 800;">Şifremi Unuttum</span>
        </div>
        
        <button class="btn-primary" id="login-btn" style="margin-bottom: 10px; padding: 12px; font-size: 16px;">Giriş Yap</button>
        <button class="action-btn" id="show-register-btn" style="padding: 12px; font-size: 16px;">Yeni Hesap Oluştur</button>
        
        <p style="font-size: 12px; color: var(--text-gray); margin-top: 20px;">Sisteme giriş için e-posta onayı gereklidir.</p>
    </div>

    <div id="register-card" style="display: none;"></div>
    <div id="verify-card" style="display: none;"></div>
</div>

<div id="app-screen" style="display: none;">
    <header id="app-header">
        <div class="logo-area">
            <div id="mobile-menu-btn" style="display: none;">☰</div>
            <div class="logo" id="logo-btn" onclick="window.loadPage('home')" style="cursor:pointer; display:flex; align-items:center;">
                <img src="uniloop-logo.png" alt="UniLoop" style="height: 36px; width: auto; object-fit: contain;">
            </div>
        </div>
        <div class="header-right-menu" style="display: flex; align-items: center; gap: 10px; height: 100%;"></div>
    </header>

    <div class="container">
        <aside class="sidebar" id="sidebar" style="display: none;">
            <div class="sidebar-top">
                <h3>Navigasyon</h3>
                <div class="menu-item active" data-target="home">🏠 Ana Sayfa</div>
                <div class="menu-item" data-target="loopmap">📍 LoopMap</div>
                <div class="menu-item" data-target="market">🛒 Kampüs Market</div>
                <div class="menu-item" data-target="confessions">🤫 Anonim Kampüs</div>
                <div class="menu-item" data-target="qa">❓ Soru & Cevap</div>
                <br>
                <h3>Bana Özel</h3>
                <div class="menu-item" id="nav-messages-btn" data-target="messages">💬 Mesajlarım <span id="msg-badge" class="badge" style="display:none;">0</span></div>
                <div id="sidebar-networks-container"></div>
            </div>
            <div class="sidebar-bottom">
                <div class="menu-item" data-target="settings">⚙️ Ayarlar</div>
            </div>
        </aside>

        <main class="main-feed" id="main-content"></main>

        <aside class="right-panel" style="display:none;">
            <div class="card sticky-card" style="padding: 15px;">
                <div id="right-networks-container"></div>
            </div>
        </aside>
    </div>
</div>

<div id="app-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">Başlık</h3>
            <span class="close-btn" id="modal-close">&times;</span>
        </div>
        <div class="modal-body" id="modal-body"></div>
    </div>
</div>

<div id="lightbox" class="lightbox">
    <span class="lightbox-close" onclick="window.closeLightbox()">&times;</span>
    <span class="lightbox-counter" id="lightbox-counter">1/3</span>
    <button class="lightbox-prev" onclick="window.changeLightboxImage(-1)">&#10094;</button>
    <img class="lightbox-content" id="lightbox-img" src="">
    <button class="lightbox-next" onclick="window.changeLightboxImage(1)">&#10095;</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
