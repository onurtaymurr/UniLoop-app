<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniLoop - Global Campus Network</title>
    
    <style>
        /* TEMEL BEYAZ EKRAN ÇÖZÜMÜ VE CSS DÜZELTMELERİ */
        body { margin: 0; padding: 0; font-family: sans-serif; background-color: #f3f4f6; color: #111827; }
        
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .auth-card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        
        .form-group input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ccc; outline: none; box-sizing: border-box; font-size: 15px; }
        .btn-primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: #4F46E5; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .action-btn { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #4F46E5; background: #EEF2FF; color: #4F46E5; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #main-content { padding-bottom: calc(80px + env(safe-area-inset-bottom)) !important; }

        body.no-scroll-messages #main-content {
            position: fixed !important;
            top: 50px !important; 
            bottom: calc(65px + env(safe-area-inset-bottom)) !important; 
            left: 0 !important;
            right: 0 !important;
            padding-bottom: 0 !important; 
            height: auto !important;
            overflow: hidden !important; 
            z-index: 40;
        }

        .bottom-nav {
            align-items: flex-end !important; 
            padding-bottom: calc(env(safe-area-inset-bottom) + 8px) !important;
            padding-top: 5px !important;
            z-index: 99999 !important; 
        }
        .bottom-nav-item { justify-content: flex-end !important; gap: 2px !important; }
        .bottom-nav-icon { margin-bottom: 2px !important; margin-top: 4px !important; }
        
        .premium-glow { animation: glowPulse 2s infinite alternate; }
        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px rgba(17, 24, 39, 0.2); }
            100% { box-shadow: 0 0 15px rgba(17, 24, 39, 0.4); }
        }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card" id="login-card">
        <div class="auth-logo" style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <img src="uniloop-logo.png" alt="UniLoop" style="width: 100%; max-width: 240px; height: auto; object-fit: contain; display: block;">
        </div>

        <p class="auth-subtitle" style="color:#6b7280; margin-bottom:20px;">Kampüs ağına giriş yap, döngüde kal.</p>
        
        <div class="form-group">
            <input type="email" id="login-email" placeholder="E-posta Adresiniz">
        </div>
        <div class="form-group" style="margin-bottom: 8px;">
            <input type="password" id="login-password" placeholder="Şifreniz">
        </div>
        
        <div style="text-align: right; margin-bottom: 20px;">
            <span id="forgot-password-btn" style="font-size: 13px; color: #4F46E5; cursor: pointer; font-weight: 600;">Şifremi Unuttum</span>
        </div>
        
        <button class="btn-primary" id="login-btn">Giriş Yap</button>
        <button class="action-btn" id="show-register-btn">Yeni Hesap Oluştur</button>
        
        <p style="font-size: 12px; color: #9ca3af; margin-top: 20px;">Sisteme giriş için e-posta onayı gereklidir.</p>
    </div>

    <div id="register-card" style="display: none;"></div>
</div>

<div id="app-screen" style="display: none;">
    <header id="app-header">
        <div class="logo-area">
            <div id="mobile-menu-btn" style="display: none;">☰</div>
            <div class="logo" id="logo-btn" onclick="window.loadPage('home')" style="cursor:pointer; display:flex; align-items:center;">
                <img src="uniloop-logo.png" alt="UniLoop" style="height: 36px; width: auto; object-fit: contain;">
            </div>
        </div>
        <div class="header-right-menu" style="display: flex; align-items: center; gap: 10px; height: 100%;"></div>
    </header>

    <div class="container">
        <main class="main-feed" id="main-content"></main>
    </div>
</div>

<div id="app-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">Başlık</h3>
            <span class="close-btn" id="modal-close">&times;</span>
        </div>
        <div class="modal-body" id="modal-body"></div>
    </div>
</div>

<div id="lightbox" class="lightbox">
    <span class="lightbox-close" onclick="window.closeLightbox()">&times;</span>
    <span class="lightbox-counter" id="lightbox-counter">1/3</span>
    <button class="lightbox-prev" onclick="window.changeLightboxImage(-1)">&#10094;</button>
    <img class="lightbox-content" id="lightbox-img" src="">
    <button class="lightbox-next" onclick="window.changeLightboxImage(1)">&#10095;</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
