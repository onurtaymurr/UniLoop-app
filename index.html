<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uniloop - Gerçek Sistem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-storage-compat.js"></script>
</head>
<body>

    <div id="auth-screen" class="active">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        
        <div class="glass-card" id="login-block">
            <h1 class="brand-title">uniloop<span style="color: #FFD700;">.</span></h1>
            <p style="color: rgba(255,255,255,0.8); margin-bottom: 25px;">Kampüsün yeni nesil ağı</p>
            <input type="email" id="login-email" class="glass-input" placeholder="Üniversite E-postası (@edu.tr)">
            <input type="password" id="login-pass" class="glass-input" placeholder="Şifre">
            <button class="btn-glass" onclick="loginUser()">Giriş Yap</button>
            <p style="color: white; margin-top: 20px; font-size: 14px;">Hesabın yok mu? <span onclick="toggleReg()" style="color: #FFD700; font-weight: bold; cursor: pointer;">Hemen Oluştur</span></p>
        </div>

        <div class="glass-card" id="reg-block" style="display: none;">
            <div class="progress-bar"><div class="progress-fill" id="reg-prog"></div></div>
            
            <div class="reg-step active" id="step-1">
                <h3 style="color:white; margin-bottom: 15px;">Kimsin Sen?</h3>
                <input type="email" class="glass-input" id="r-email" placeholder="E-posta">
                <input type="password" class="glass-input" id="r-pass" placeholder="Şifre">
                <input type="text" class="glass-input" id="r-name" placeholder="Ad Soyad">
                <input type="number" inputmode="numeric" class="glass-input" id="r-age" placeholder="Yaşın">
                <select class="glass-input select-dark" id="r-dept">
                    <option value="" disabled selected>Fakülte Seçin</option>
                    <option value="Mühendislik">Mühendislik Fakültesi</option>
                    <option value="Tıp">Tıp Fakültesi</option>
                    <option value="Hukuk">Hukuk Fakültesi</option>
                </select>
                <button class="btn-glass" onclick="nextStep(2)">İleri</button>
            </div>
            
            <div class="reg-step" id="step-2">
                <h3 style="color:white; margin-bottom: 10px;">Hobilerin (En az 3)</h3>
                <div id="hobbies-list" style="margin-bottom: 15px;">
                    <span class="hobi-tag" onclick="this.classList.toggle('selected')">Müzik</span>
                    <span class="hobi-tag" onclick="this.classList.toggle('selected')">Spor</span>
                    <span class="hobi-tag" onclick="this.classList.toggle('selected')">Yazılım</span>
                    <span class="hobi-tag" onclick="this.classList.toggle('selected')">Oyun</span>
                    <span class="hobi-tag" onclick="this.classList.toggle('selected')">Sinema</span>
                </div>
                <button class="btn-glass" onclick="nextStep(3)">İleri</button>
            </div>
            
            <div class="reg-step" id="step-3">
                <h3 style="color:white; margin-bottom: 15px;">Amacın & Fotoğrafın</h3>
                <select class="glass-input select-dark" id="r-purpose">
                    <option value="Arkadaş Edinmek">Arkadaş Edinmek</option>
                    <option value="Network">Network / Kariyer</option>
                    <option value="Sevgili Bulmak">Sevgili Bulmak</option>
                </select>
                
                <input type="file" id="r-photo" accept="image/*" style="display: none;" onchange="previewImage(event)">
                <div class="photo-upload" id="photo-preview" onclick="document.getElementById('r-photo').click()">
                    <i class="fa-solid fa-camera"></i>
                    <span>Fotoğraf Seç</span>
                </div>
                
                <button class="btn-glass" onclick="registerUserToFirebase()" id="btn-register">Sisteme Kaydol</button>
            </div>
        </div>
    </div>

    <div id="app-container">
        <header id="top-header">
            <h2 class="brand-title-small">uniloop</h2>
            <div class="header-actions">
                <button class="btn-premium"><i class="fa-solid fa-crown"></i></button>
                <i class="fa-regular fa-bell btn-icon"></i>
            </div>
        </header>

        <main id="app-content"></main>

        <nav id="bottom-nav">
            <button class="nav-btn active" onclick="nav('discover', this)"><i class="fa-solid fa-layer-group"></i><span>Keşfet</span></button>
            <button class="nav-btn" onclick="nav('voice', this)"><i class="fa-solid fa-headset"></i><span>BlindTalk</span></button>
            <button class="nav-btn" onclick="nav('tournament', this)"><i class="fa-solid fa-trophy"></i><span>Turnuva</span></button>
            <button class="nav-btn" onclick="nav('messages', this)"><i class="fa-regular fa-comment-dots"></i><span>Mesajlar</span></button>
            <button class="nav-btn" onclick="nav('profile', this)"><i class="fa-regular fa-user"></i><span>Profil</span></button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
