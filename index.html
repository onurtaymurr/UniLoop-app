<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniloop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header id="top-header">
        <div class="logo">
            <img src="uniloop_logo.png" alt="Uniloop" onerror="this.src='https://via.placeholder.com/100x40?text=Uniloop'">
        </div>
        <div class="header-actions">
            <button class="btn-premium">Premium Ol</button>
            <i class="fa-regular fa-bell btn-icon"></i>
        </div>
    </header>

    <main id="app-content">
        </main>

    <nav id="bottom-nav">
        <button class="nav-btn active" data-page="discover">
            <i class="fa-solid fa-fire"></i>
            <span>Keşfet</span>
        </button>
        <button class="nav-btn" data-page="voice">
            <i class="fa-solid fa-microphone-lines"></i>
            <span>Ani Ses</span>
        </button>
        <button class="nav-btn" data-page="tournament">
            <i class="fa-solid fa-trophy"></i>
            <span>Turnuva</span>
        </button>
        <button class="nav-btn" data-page="messages">
            <i class="fa-regular fa-comment-dots"></i>
            <span>Mesajlar</span>
        </button>
        <button class="nav-btn" data-page="profile">
            <i class="fa-regular fa-user"></i>
            <span>Profil</span>
        </button>
    </nav>

    <script src="pages.js"></script>
    <script src="app.js"></script>
</body>
</html>
