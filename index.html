<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uniloop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="login-screen" class="active">
        <div class="login-container">
            <img src="uniloop_logo.png" alt="Uniloop" class="login-logo" onerror="this.src='https://via.placeholder.com/150x50?text=Uniloop'">
            <h2>Üniversitenin Ritmini Yakala</h2>
            <form id="login-form">
                <input type="email" placeholder="Üniversite E-postası" required>
                <input type="password" placeholder="Şifre" required>
                <button type="submit" class="btn-primary">Giriş Yap</button>
            </form>
            <p class="signup-text">Hesabın yok mu? <span>Hemen Oluştur</span></p>
        </div>
    </div>

    <div id="app-container">
        <header id="top-header">
            <div class="logo">
                <img src="uniloop_logo.png" alt="Uniloop" onerror="this.src='https://via.placeholder.com/100x30?text=Uniloop'">
            </div>
            <div class="header-actions">
                <button id="btn-premium" class="btn-premium">Premium</button>
                <i id="btn-notifications" class="fa-regular fa-bell btn-icon"></i>
            </div>
        </header>

        <main id="app-content"></main>

        <nav id="bottom-nav">
            <button class="nav-btn active" data-page="discover"><i class="fa-solid fa-layer-group"></i><span>Keşfet</span></button>
            <button class="nav-btn" data-page="voice"><i class="fa-solid fa-headset"></i><span>BlindTalk</span></button>
            <button class="nav-btn" data-page="tournament"><i class="fa-solid fa-trophy"></i><span>Turnuva</span></button>
            <button class="nav-btn" data-page="messages"><i class="fa-regular fa-comment-dots"></i><span>Mesajlar</span></button>
            <button class="nav-btn" data-page="profile"><i class="fa-regular fa-user"></i><span>Profil</span></button>
        </nav>
    </div>

    <div id="modal-overlay" class="modal-overlay"></div>
    
    <div id="premium-modal" class="modal">
        <h3>Uniloop Premium <i class="fa-solid fa-crown" style="color: gold;"></i></h3>
        <p>Sınırsız kaydırma, profilini kimlerin gördüğünü öğrenme ve turnuvada 2x görünürlük kazan!</p>
        <button class="btn-primary mt-15" onclick="closeModals()">Yükselt</button>
    </div>

    <div id="notifications-modal" class="modal">
        <h3>Bildirimler</h3>
        <ul style="text-align: left; margin-top: 15px; list-style: none;">
            <li style="padding: 10px; border-bottom: 1px solid #eee;">🔥 Turnuvada Liderlik Tablosuna girdin!</li>
            <li style="padding: 10px; border-bottom: 1px solid #eee;">💬 Yeni bir eşleşmen var!</li>
        </ul>
        <button class="btn-outline mt-15" onclick="closeModals()">Kapat</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
