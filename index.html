<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uniloop - Üniversitenin Ritmi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="login-screen" class="active">
        <div class="login-container">
            <h1 class="brand-title">uniloop</h1>
            <p style="color: #666; margin-bottom: 20px;">Üniversitene Özel Ağ</p>
            <form id="login-form">
                <input type="email" id="email-input" placeholder="Üniversite E-postası (@edu.tr)" required>
                <input type="password" id="password-input" placeholder="Şifre" required>
                <button type="submit" class="btn-primary">Sisteme Gir</button>
            </form>
            <p class="signup-text">Hesabın yok mu? <span onclick="alert('Kayıt ekranı eklenecek')">Hemen Oluştur</span></p>
        </div>
    </div>

    <div id="app-container">
        <header id="top-header">
            <h2 class="brand-title-small">uniloop</h2>
            <div class="header-actions">
                <button id="btn-premium" class="btn-premium">Premium</button>
                <i id="btn-notifications" class="fa-regular fa-bell btn-icon"></i>
            </div>
        </header>

        <main id="app-content"></main>

        <nav id="bottom-nav">
            <button class="nav-btn active" data-page="discover"><i class="fa-solid fa-layer-group"></i><span>Keşfet</span></button>
            <button class="nav-btn" data-page="voice"><i class="fa-solid fa-headset"></i><span>BlindTalk</span></button>
            <button class="nav-btn" data-page="tournament"><i class="fa-solid fa-trophy"></i><span>Turnuva</span></button>
            <button class="nav-btn" data-page="messages"><i class="fa-regular fa-comment-dots"></i><span>Mesajlar</span></button>
            <button class="nav-btn" data-page="profile"><i class="fa-regular fa-user"></i><span>Profil</span></button>
        </nav>
    </div>

    <div id="modal-overlay" class="modal-overlay"></div>
    
    <div id="premium-modal" class="modal">
        <h3>Uniloop Premium <i class="fa-solid fa-crown" style="color: gold;"></i></h3>
        <p style="margin-top: 10px; color: #555;">Sınırsız kaydırma ve turnuvada x2 görünürlük!</p>
        <button class="btn-primary" style="margin-top: 15px;" onclick="closeModals()">Hemen Al</button>
    </div>

    <div id="notifications-modal" class="modal">
        <h3>Bildirimler</h3>
        <ul style="text-align: left; margin-top: 15px; list-style: none; padding: 0;">
            <li style="padding: 10px 0; border-bottom: 1px solid #eee;">🔥 Aylin seni turnuvada oyladı!</li>
            <li style="padding: 10px 0; border-bottom: 1px solid #eee;">💬 Yeni eşleşme: Berk!</li>
        </ul>
        <button class="btn-outline" style="margin-top: 15px; width: 100%;" onclick="closeModals()">Kapat</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
